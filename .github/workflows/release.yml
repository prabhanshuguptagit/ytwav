name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Make app bundle
        run: |
          BIN=.build/apple/Products/Release/YtWav
          APP=YtWav
          mkdir -p "$APP.app/Contents/MacOS"
          cp "$BIN" "$APP.app/Contents/MacOS/"
          cat > "$APP.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.ytwav.YtWav</string>
              <key>CFBundleName</key>
              <string>YtWav</string>
              <key>CFBundleExecutable</key>
              <string>YtWav</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF
          codesign --force --sign - "$APP.app/Contents/MacOS/$APP"
          ditto -c -k --keepParent "$APP.app" "YtWav.zip"

      - name: Update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: "Built from ${{ github.sha }}"
          files: YtWav.zip
          prerelease: false
